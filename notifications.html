<!-- notifications.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Notifications - WASH EASE</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F0E8;
    --card: #FFFFFF;
    --primary: #2C4A3E;
    --primary-light: #3D6B5C;
    --primary-dark: #1A2E26;
    --accent: #E8A87C;
    --accent-hover: #D4956A;
    --accent2: #D4C5B0;
    --text: #1A1A1A;
    --text-muted: #6B7280;
    --pending: #F59E0B;
    --process: #3B82F6;
    --done: #10B981;
    --danger: #EF4444;
    --border: #E5DDD0;
    --shadow: 0 4px 24px rgba(44,74,62,0.10);
    --shadow-hover: 0 8px 32px rgba(44,74,62,0.18);
    --radius: 18px;
    --radius-sm: 10px;
    --font-display: 'DM Serif Display', serif;
    --font-body: 'DM Sans', sans-serif;
    --transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: var(--font-body);
    background: #D8D0C4;
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .phone {
    width: 100%;
    max-width: 390px;
    height: 100vh;
    max-height: 844px;
    background: var(--bg);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  .screen { display:flex; flex-direction:column; height:100%; animation: slideIn 0.28s cubic-bezier(0.4,0,0.2,1); }

  @keyframes slideIn { from{opacity:0;transform:translateX(24px)} to{opacity:1;transform:translateX(0)} }
  @keyframes shimmer { from{transform:translateX(20px);opacity:1} to{transform:translateX(-60px);opacity:0} }

  /* HEADER */
  .header {
    padding: 16px 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    position: relative; z-index: 10;
    flex-shrink: 0;
  }
  .header-title { font-family:var(--font-display); font-size:20px; color:var(--primary); }
  .header .back-btn {
    width:36px; height:36px; border-radius:50%;
    background:var(--bg); border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-size:18px; color:var(--primary); transition:var(--transition);
  }
  .header .back-btn:hover { background:var(--primary); color:#fff; transform:translateX(-2px); box-shadow:0 4px 12px rgba(44,74,62,0.25); }
  .header .back-btn:active { transform:scale(0.92); }

  /* SCROLL */
  .scroll-content { flex:1; overflow-y:auto; padding:20px; -webkit-overflow-scrolling:touch; }
  .scroll-content::-webkit-scrollbar { width:4px; }
  .scroll-content::-webkit-scrollbar-track { background:transparent; }
  .scroll-content::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  /* BOTTOM NAV */
  .bottom-nav { display:flex; background:var(--card); border-top:1px solid var(--border); padding:8px 0 16px; flex-shrink:0; }
  .nav-item {
    flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
    padding:8px 0; cursor:pointer; border:none; background:none;
    color:var(--text-muted); font-family:var(--font-body); font-size:11px; font-weight:500;
    transition:var(--transition); border-radius:var(--radius-sm); margin:0 4px;
    position: relative;
  }
  .nav-item:hover { color:var(--primary); background:rgba(44,74,62,0.06); transform:translateY(-2px); }
  .nav-item.active { color:var(--primary); }
  .nav-item.active .nav-icon { transform:scale(1.15); filter:drop-shadow(0 2px 4px rgba(44,74,62,0.2)); }
  .nav-icon { font-size:22px; transition:var(--transition); }

  /* BADGES */
  .badge { display:inline-flex; align-items:center; padding:4px 10px; border-radius:20px; font-size:12px; font-weight:700; letter-spacing:0.3px; }
  .badge-pending { background:rgba(245,158,11,0.15); color:var(--pending); }
  .badge-process { background:rgba(59,130,246,0.15); color:var(--process); }
  .badge-done { background:rgba(16,185,129,0.15); color:var(--done); }

  /* NOTIFICATION ITEM */
  .notif-item {
    background:var(--card); border-radius:var(--radius-sm); padding:14px 16px;
    margin-bottom:10px; box-shadow:0 2px 8px rgba(0,0,0,0.05); transition:var(--transition);
    cursor: pointer; border-left: 3px solid transparent;
  }
  .notif-item:hover { box-shadow:var(--shadow-hover); transform:translateY(-1px); }
  .notif-item.unread-pending { border-left-color: var(--pending); background: rgba(245,158,11,0.03); }
  .notif-item.unread-process { border-left-color: var(--process); background: rgba(59,130,246,0.03); }
  .notif-item.unread-done { border-left-color: var(--done); background: rgba(16,185,129,0.04); }
  .notif-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
  .notif-title { font-size:14px; font-weight:700; }
  .notif-time { font-size:11px; color:var(--text-muted); margin-top:2px; }

  /* PROGRESS BAR */
  .progress-bar { height:6px; background:var(--border); border-radius:3px; overflow:hidden; margin:8px 0; }
  .progress-fill {
    height:100%; background:linear-gradient(90deg, var(--primary), var(--accent));
    border-radius:3px; transition:width 0.6s cubic-bezier(0.4,0,0.2,1); position:relative;
  }
  .progress-fill::after { content:''; position:absolute; top:0; right:0; width:20px; height:100%; background:rgba(255,255,255,0.4); animation:shimmer 1.5s infinite; }

  .empty-state { text-align:center; padding:40px 20px; color:var(--text-muted); }
  .empty-state .empty-icon { font-size:48px; margin-bottom:12px; }
  .empty-state p { font-size:14px; }

  /* TOAST */
  .toast {
    position:absolute; bottom:110px; left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--primary); color:#fff; padding:12px 24px;
    border-radius:30px; font-size:14px; font-weight:600;
    opacity:0; transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
    white-space:nowrap; pointer-events:none; z-index:100;
    box-shadow:0 8px 24px rgba(44,74,62,0.3); max-width:330px;
    text-align:center; white-space:normal;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="phone" id="app">

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- ====== NOTIFICATIONS ====== -->
  <div class="screen active" id="screen-notifications">
    <div class="header">
      <button class="back-btn" onclick="location.href='services.html'">←</button>
      <div class="header-title">Notifications</div>
      <div style="width:36px"></div>
    </div>
    <div class="scroll-content" id="notif-list"></div>
    <div class="bottom-nav">
      <button class="nav-item" onclick="location.href='services.html'"><span class="nav-icon">🏠</span>Services</button>
      <button class="nav-item" onclick="location.href='bookings.html'"><span class="nav-icon">📋</span>Bookings</button>
      <button class="nav-item active"><span class="nav-icon">🔔</span>Notifs</button>
      <button class="nav-item" onclick="location.href='profile.html'"><span class="nav-icon">👤</span>Profile</button>
    </div>
  </div>

</div><!-- end .phone -->

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let bookings = JSON.parse(localStorage.getItem('bookings')) || [];
let unreadIds = new Set(JSON.parse(localStorage.getItem('unreadIds')) || []);
let currentUser = JSON.parse(localStorage.getItem('currentUser'));

// Check auth
if (!currentUser) {
  location.href = 'login.html';
}

// Mark all as read when viewing
markAllRead();

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  clearTimeout(toastTimer);
  t.textContent = msg;
  t.className = 'toast' + (type ? ` toast-${type}` : '');
  t.classList.add('show');
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ═══════════════════════════════════════════════
// NOTIFICATIONS
// ═══════════════════════════════════════════════
function markAllRead() {
  if (!currentUser) return;
  bookings
    .filter(b => b.username === currentUser.username)
    .forEach(b => unreadIds.delete(b.id));
  localStorage.setItem('unreadIds', JSON.stringify([...unreadIds]));
}

function badge(status) {
  const map = { pending:'badge-pending', process:'badge-process', done:'badge-done' };
  const lbl = { pending:'Pending', process:'Washing 🔄', done:'Done ✅' };
  return `<span class="badge ${map[status]||''}">${lbl[status]||status}</span>`;
}

function renderNotifications() {
  if (!currentUser) return;
  const mine = bookings.filter(b => b.username === currentUser.username);
  const el = document.getElementById('notif-list');
  
  if (!mine.length) { 
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🔔</div><p>No notifications yet.</p></div>`; 
    return; 
  }

  el.innerHTML = mine.map(b => {
    const isUnread = unreadIds.has(b.id);
    let cls = 'notif-item', msg = '', extra = '';
    
    if (isUnread) cls += ` unread-${b.status}`;
    if (b.status === 'pending') msg = 'Your booking has been received and is awaiting processing.';
    if (b.status === 'process') { 
      msg = '🔄 Your laundry is now being washed!'; 
      extra = `<div class="progress-bar" style="margin-top:8px;"><div class="progress-fill" style="width:60%"></div></div>`; 
    }
    if (b.status === 'done') msg = '✅ Your laundry is ready for pick-up! Please come to the shop.';
    
    return `
      <div class="${cls}" onclick="location.href='booking_detail.html?id=${b.id}'">
        <div class="notif-header">
          <div>
            <div class="notif-title">${b.serviceIcon} ${b.service} — #${b.id}</div>
            <div class="notif-time">${b.date} · ${b.time}${b.statusUpdatedAt ? ' · Updated ' + b.statusUpdatedAt : ''}</div>
          </div>
          ${badge(b.status)}
        </div>
        <div style="font-size:13px;color:var(--text-muted);margin-top:6px;">${msg}</div>
        ${extra}
        ${isUnread ? `<div style="font-size:11px;font-weight:700;color:var(--primary);margin-top:6px;">● New update</div>` : ''}
      </div>`;
  }).join('');
}

// Init
renderNotifications();
</script>
</body>
</html>
