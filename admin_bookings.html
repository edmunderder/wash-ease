<!-- admin_bookings.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Manage Bookings - WASH EASE</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F0E8;
    --card: #FFFFFF;
    --primary: #2C4A3E;
    --primary-light: #3D6B5C;
    --primary-dark: #1A2E26;
    --accent: #E8A87C;
    --accent-hover: #D4956A;
    --accent2: #D4C5B0;
    --text: #1A1A1A;
    --text-muted: #6B7280;
    --pending: #F59E0B;
    --process: #3B82F6;
    --done: #10B981;
    --danger: #EF4444;
    --border: #E5DDD0;
    --shadow: 0 4px 24px rgba(44,74,62,0.10);
    --shadow-hover: 0 8px 32px rgba(44,74,62,0.18);
    --radius: 18px;
    --radius-sm: 10px;
    --font-display: 'DM Serif Display', serif;
    --font-body: 'DM Sans', sans-serif;
    --transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: var(--font-body);
    background: #D8D0C4;
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .phone {
    width: 100%;
    max-width: 390px;
    height: 100vh;
    max-height: 844px;
    background: var(--bg);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  .screen { display:flex; flex-direction:column; height:100%; animation: slideIn 0.28s cubic-bezier(0.4,0,0.2,1); }

  @keyframes slideIn { from{opacity:0;transform:translateX(24px)} to{opacity:1;transform:translateX(0)} }

  /* HEADER */
  .header {
    padding: 16px 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
    position: relative; z-index: 10;
    flex-shrink: 0;
  }
  .header-title { font-family:var(--font-display); font-size:20px; color:var(--primary); }

  /* ADMIN HEADER */
  .admin-header { background:linear-gradient(135deg, var(--primary-dark), var(--primary)); }
  .admin-header .header-title { color:#fff; }
  .admin-header .back-btn { background:rgba(255,255,255,0.12); color:#fff; border:1px solid rgba(255,255,255,0.15); }
  .admin-header .back-btn:hover { background:rgba(255,255,255,0.25); color:#fff; }

  /* ADMIN LOGOUT BTN */
  .admin-logout-btn {
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.4);
    color: #FCA5A5;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: var(--font-body);
    transition: var(--transition);
    display: flex; align-items: center; gap: 5px;
  }
  .admin-logout-btn:hover { background: rgba(239,68,68,0.3); border-color: rgba(239,68,68,0.7); color: #fff; transform: translateY(-1px); }
  .admin-logout-btn:active { transform: scale(0.96); }

  /* SCROLL */
  .scroll-content { flex:1; overflow-y:auto; padding:20px; -webkit-overflow-scrolling:touch; }
  .scroll-content::-webkit-scrollbar { width:4px; }
  .scroll-content::-webkit-scrollbar-track { background:transparent; }
  .scroll-content::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  /* BOTTOM NAV */
  .bottom-nav { display:flex; background:var(--card); border-top:1px solid var(--border); padding:8px 0 16px; flex-shrink:0; }
  .nav-item {
    flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
    padding:8px 0; cursor:pointer; border:none; background:none;
    color:var(--text-muted); font-family:var(--font-body); font-size:11px; font-weight:500;
    transition:var(--transition); border-radius:var(--radius-sm); margin:0 4px;
    position: relative;
  }
  .nav-item:hover { color:var(--primary); background:rgba(44,74,62,0.06); transform:translateY(-2px); }
  .nav-item.active { color:var(--primary); }
  .nav-item.active .nav-icon { transform:scale(1.15); filter:drop-shadow(0 2px 4px rgba(44,74,62,0.2)); }
  .nav-icon { font-size:22px; transition:var(--transition); }

  /* TABS */
  .tabs { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  .tab {
    padding:8px 16px; border-radius:20px; border:1.5px solid transparent; cursor:pointer;
    font-family:var(--font-body); font-size:13px; font-weight:600;
    background:var(--bg); color:var(--text-muted); transition:var(--transition);
  }
  .tab:hover:not(.active) { background:var(--card); color:var(--text); border-color:var(--border); transform:translateY(-1px); }
  .tab.active { background:linear-gradient(135deg, var(--primary), var(--primary-light)); color:#fff; box-shadow:0 4px 12px rgba(44,74,62,0.25); }

  /* BADGES */
  .badge { display:inline-flex; align-items:center; padding:4px 10px; border-radius:20px; font-size:12px; font-weight:700; letter-spacing:0.3px; }
  .badge-pending { background:rgba(245,158,11,0.15); color:var(--pending); }
  .badge-process { background:rgba(59,130,246,0.15); color:var(--process); }
  .badge-done { background:rgba(16,185,129,0.15); color:var(--done); }

  /* MANAGE ITEMS */
  .manage-item {
    background:var(--card); border-radius:var(--radius-sm); padding:14px 16px;
    margin-bottom:10px; box-shadow:0 2px 8px rgba(0,0,0,0.05);
    transition:var(--transition); border:1.5px solid transparent;
  }
  .manage-item:hover { box-shadow:0 6px 18px rgba(0,0,0,0.09); border-color:var(--border); transform:translateY(-1px); }
  .manage-item-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .manage-item-name { font-size:15px; font-weight:700; }
  .manage-item-meta { font-size:12px; color:var(--text-muted); margin-bottom:2px; }
  .manage-item-footer { display:flex; align-items:center; justify-content:space-between; margin-top:10px; }

  /* BUTTONS */
  .btn {
    width:100%; padding:15px; border-radius:var(--radius-sm); border:none; cursor:pointer;
    font-family:var(--font-body); font-size:15px; font-weight:600;
    transition:var(--transition); letter-spacing:0.3px; position:relative; overflow:hidden;
  }
  .btn:active { transform:scale(0.97); }
  .btn-primary { background:linear-gradient(135deg, var(--primary), var(--primary-light)); color:#fff; box-shadow:0 4px 16px rgba(44,74,62,0.25); }
  .btn-primary:hover { background:linear-gradient(135deg, var(--primary-dark), var(--primary)); box-shadow:0 8px 24px rgba(44,74,62,0.35); transform:translateY(-2px); }
  .btn-primary:active { transform:translateY(0) scale(0.97); }
  .btn-sm { width:auto; padding:8px 16px; font-size:13px; }

  .empty-state { text-align:center; padding:40px 20px; color:var(--text-muted); }
  .empty-state .empty-icon { font-size:48px; margin-bottom:12px; }
  .empty-state p { font-size:14px; }

  /* TOAST */
  .toast {
    position:absolute; bottom:110px; left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--primary); color:#fff; padding:12px 24px;
    border-radius:30px; font-size:14px; font-weight:600;
    opacity:0; transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
    white-space:nowrap; pointer-events:none; z-index:100;
    box-shadow:0 8px 24px rgba(44,74,62,0.3); max-width:330px;
    text-align:center; white-space:normal;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="phone" id="app">

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- ====== ADMIN MANAGE BOOKINGS ====== -->
  <div class="screen active" id="screen-admin-bookings">
    <div class="header admin-header">
      <button class="back-btn" onclick="location.href='admin_dashboard.html'">←</button>
      <div class="header-title">Manage Bookings</div>
      <button class="admin-logout-btn" onclick="doAdminLogout()">⏻ Sign Out</button>
    </div>
    <div class="scroll-content">
      <div class="tabs">
        <button class="tab active" onclick="filterAdminTab(this,'ap')">Pending</button>
        <button class="tab" onclick="filterAdminTab(this,'aw')">In Process</button>
        <button class="tab" onclick="filterAdminTab(this,'ad')">Completed</button>
      </div>
      <div id="ap"></div>
      <div id="aw" style="display:none;"></div>
      <div id="ad" style="display:none;"></div>
    </div>
    <div class="bottom-nav">
      <button class="nav-item active"><span class="nav-icon">📋</span>Bookings</button>
      <button class="nav-item" onclick="location.href='admin_services.html'"><span class="nav-icon">⚙️</span>Services</button>
      <button class="nav-item" onclick="location.href='admin_dashboard.html'"><span class="nav-icon">📊</span>Dashboard</button>
    </div>
  </div>

</div><!-- end .phone -->

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let bookings = JSON.parse(localStorage.getItem('bookings')) || [];

// Check admin auth
if (!localStorage.getItem('adminLoggedIn')) {
  location.href = 'admin_login.html';
}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  clearTimeout(toastTimer);
  t.textContent = msg;
  t.className = 'toast' + (type ? ` toast-${type}` : '');
  t.classList.add('show');
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ═══════════════════════════════════════════════
// STATUS HELPERS
// ═══════════════════════════════════════════════
function badge(status) {
  const map = { pending:'badge-pending', process:'badge-process', done:'badge-done' };
  const lbl = { pending:'Pending', process:'Washing 🔄', done:'Done ✅' };
  return `<span class="badge ${map[status]||''}">${lbl[status]||status}</span>`;
}

// ═══════════════════════════════════════════════
// ADMIN MANAGE BOOKINGS
// ═══════════════════════════════════════════════
function renderAdminBookings() {
  renderAdminList('ap', bookings.filter(b => b.status === 'pending'));
  renderAdminList('aw', bookings.filter(b => b.status === 'process'));
  renderAdminList('ad', bookings.filter(b => b.status === 'done'));
}

function renderAdminList(cId, list) {
  const el = document.getElementById(cId);
  if (!list.length) { 
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>No bookings here.</p></div>`; 
    return; 
  }
  el.innerHTML = list.map(b => `
    <div class="manage-item">
      <div class="manage-item-header"><div class="manage-item-name">${b.name}</div>${badge(b.status)}</div>
      <div class="manage-item-meta">📅 ${b.date} · ${b.time}</div>
      <div class="manage-item-meta">${b.serviceIcon} ${b.service} · #${b.id}</div>
      <div class="manage-item-meta">👤 @${b.username}</div>
      ${b.statusUpdatedAt ? `<div class="manage-item-meta">🕐 Last update: ${b.statusUpdatedAt}</div>` : ''}
      <div class="manage-item-footer">
        <span style="font-size:13px;color:var(--primary);font-weight:600;">₱ ${b.price}.00</span>
        ${b.status !== 'done' ? `<button class="btn btn-primary btn-sm" onclick="location.href='admin_update.html?id=${b.id}'">Update Status</button>` : `<span style="font-size:12px;color:var(--done);font-weight:700;">✅ Completed</span>`}
      </div>
    </div>`).join('');
}

// ═══════════════════════════════════════════════
// TAB FILTERS
// ═══════════════════════════════════════════════
function filterAdminTab(btn, showId) {
  btn.closest('.tabs').querySelectorAll('.tab').forEach(t => t.classList.remove('active')); 
  btn.classList.add('active');
  ['ap', 'aw', 'ad'].forEach(id => { const e = document.getElementById(id); if (e) e.style.display = 'none'; });
  const s = document.getElementById(showId); 
  if (s) s.style.display = 'block';
}

function doAdminLogout() {
  localStorage.removeItem('adminLoggedIn');
  showToast('Admin signed out.');
  setTimeout(() => location.href = 'index.html', 900);
}

// Init
renderAdminBookings();
</script>
</body>
</html>
