<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sign In - WASH EASE</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F0E8;
    --card: rgba(255,255,255,0.55);
    --card-border: rgba(255,255,255,0.75);
    --primary: #2C4A3E;
    --primary-light: #3D6B5C;
    --primary-dark: #1A2E26;
    --accent: #E8A87C;
    --accent-hover: #D4956A;
    --accent2: #D4C5B0;
    --text: #1A1A1A;
    --text-muted: #5a6775;
    --pending: #F59E0B;
    --process: #3B82F6;
    --done: #10B981;
    --danger: #EF4444;
    --border: rgba(229,221,208,0.6);
    --shadow: 0 8px 40px rgba(44,74,62,0.18);
    --shadow-hover: 0 16px 48px rgba(44,74,62,0.28);
    --radius: 24px;
    --radius-sm: 12px;
    --font-display: 'DM Serif Display', serif;
    --font-body: 'DM Sans', sans-serif;
    --transition: all 0.26s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  /* ── ANIMATED BACKGROUND ── */
  body {
    font-family: var(--font-body);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1e3a2f 0%, #2C4A3E 35%, #3D6B5C 65%, #4a7c6b 100%);
    position: relative;
  }

  /* Animated blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.45;
    animation: blobFloat linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  .blob-1 {
    width: 420px; height: 420px;
    background: radial-gradient(circle, #E8A87C 0%, #d4846a 60%, transparent 100%);
    top: -100px; left: -100px;
    animation-duration: 18s; animation-delay: 0s;
  }
  .blob-2 {
    width: 360px; height: 360px;
    background: radial-gradient(circle, #5fa58a 0%, #3D6B5C 60%, transparent 100%);
    bottom: -80px; right: -80px;
    animation-duration: 22s; animation-delay: -6s;
  }
  .blob-3 {
    width: 280px; height: 280px;
    background: radial-gradient(circle, #f0d5b8 0%, #e8c49a 60%, transparent 100%);
    top: 40%; left: 60%;
    animation-duration: 15s; animation-delay: -3s;
  }
  .blob-4 {
    width: 200px; height: 200px;
    background: radial-gradient(circle, #7fb8a4 0%, #4a8c78 60%, transparent 100%);
    top: 60%; left: -60px;
    animation-duration: 20s; animation-delay: -10s;
  }
  @keyframes blobFloat {
    0%   { transform: translate(0px, 0px) scale(1); }
    25%  { transform: translate(30px, -30px) scale(1.05); }
    50%  { transform: translate(-20px, 20px) scale(0.95); }
    75%  { transform: translate(20px, 10px) scale(1.03); }
    100% { transform: translate(0px, 0px) scale(1); }
  }

  /* Subtle grid overlay */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* ── PHONE SHELL ── */
  .phone {
    width: 100%;
    max-width: 390px;
    height: 100vh;
    max-height: 844px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    z-index: 1;
  }

  .screen { display:flex; flex-direction:column; height:100%; animation: slideIn 0.32s cubic-bezier(0.4,0,0.2,1); }

  @keyframes slideIn { from{opacity:0;transform:translateX(24px)} to{opacity:1;transform:translateX(0)} }
  @keyframes fadeUp  { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes floatIn { from{opacity:0;transform:translateY(32px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }

  /* ── HEADER (glass) ── */
  .header {
    padding: 16px 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border-bottom: 1px solid rgba(255,255,255,0.25);
    position: relative; z-index: 10;
    flex-shrink: 0;
  }
  .header-title {
    font-family: var(--font-display);
    font-size: 20px;
    color: #fff;
    text-shadow: 0 1px 8px rgba(0,0,0,0.18);
  }
  .header .back-btn {
    width:36px; height:36px; border-radius:50%;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.3);
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-size:18px; color:#fff; transition:var(--transition);
    backdrop-filter: blur(8px);
  }
  .header .back-btn:hover {
    background: rgba(255,255,255,0.35);
    transform: translateX(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  }
  .header .back-btn:active { transform:scale(0.92); }

  /* ── SCROLL AREA ── */
  .scroll-content {
    flex:1; overflow-y:auto; padding: 32px 24px 36px;
    -webkit-overflow-scrolling:touch;
    display: flex; flex-direction: column; justify-content: center;
  }
  .scroll-content::-webkit-scrollbar { width:4px; }
  .scroll-content::-webkit-scrollbar-track { background:transparent; }
  .scroll-content::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.25); border-radius:2px; }

  /* ── GLASS CARD ── */
  .glass-card {
    background: rgba(255,255,255,0.22);
    backdrop-filter: blur(28px) saturate(1.6) brightness(1.08);
    -webkit-backdrop-filter: blur(28px) saturate(1.6) brightness(1.08);
    border: 1px solid rgba(255,255,255,0.42);
    border-radius: 28px;
    padding: 32px 28px;
    box-shadow:
      0 8px 40px rgba(0,0,0,0.18),
      inset 0 1px 0 rgba(255,255,255,0.55),
      inset 0 -1px 0 rgba(0,0,0,0.06);
    animation: floatIn 0.48s cubic-bezier(0.22,1,0.36,1) both;
    animation-delay: 0.1s;
    position: relative;
    overflow: hidden;
    transition: box-shadow 0.3s ease, transform 0.3s ease;
  }
  .glass-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
  }
  .glass-card:hover {
    box-shadow:
      0 16px 56px rgba(0,0,0,0.24),
      inset 0 1px 0 rgba(255,255,255,0.65),
      inset 0 -1px 0 rgba(0,0,0,0.06);
    transform: translateY(-2px);
  }

  /* ── WELCOME TEXT ── */
  .welcome-title {
    font-family: var(--font-display);
    font-size: 32px;
    color: #fff;
    text-shadow: 0 2px 16px rgba(0,0,0,0.2);
    line-height: 1.15;
  }
  .welcome-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.72);
    margin-top: 6px;
  }

  /* ── FORM ELEMENTS ── */
  .form-group { margin-bottom: 18px; }
  .form-label {
    display:block; font-size:11px; font-weight:700;
    color: rgba(255,255,255,0.75);
    margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: 0.9px;
  }
  .form-input {
    width: 100%; padding: 14px 16px;
    border: 1.5px solid rgba(255,255,255,0.28);
    border-radius: var(--radius-sm);
    font-family: var(--font-body); font-size: 15px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    outline: none;
    transition: var(--transition);
    -webkit-appearance: none;
    backdrop-filter: blur(8px);
  }
  .form-input::placeholder { color: rgba(255,255,255,0.42); }
  .form-input:focus {
    border-color: rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.28);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.12);
    transform: translateY(-1px);
  }
  .form-input:hover:not(:focus) {
    border-color: rgba(255,255,255,0.45);
    background: rgba(255,255,255,0.20);
  }

  /* ── BUTTONS ── */
  .btn {
    width:100%; padding:15px; border-radius:var(--radius-sm); border:none; cursor:pointer;
    font-family:var(--font-body); font-size:15px; font-weight:600;
    transition:var(--transition); letter-spacing:0.3px; position:relative; overflow:hidden;
  }
  .btn:active { transform:scale(0.97); }

  .btn-primary {
    background: linear-gradient(135deg, rgba(255,255,255,0.92) 0%, rgba(245,240,232,0.95) 100%);
    color: var(--primary);
    box-shadow: 0 4px 20px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,1);
  }
  .btn-primary::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(232,168,124,0.0) 0%, rgba(232,168,124,0.0) 100%);
    transition: var(--transition);
    border-radius: inherit;
  }
  .btn-primary:hover {
    background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.98) 100%);
    box-shadow: 0 8px 28px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,1);
    transform: translateY(-2px);
    color: var(--primary-dark);
  }
  .btn-primary:hover::after {
    background: linear-gradient(135deg, rgba(232,168,124,0.08) 0%, rgba(44,74,62,0.06) 100%);
  }

  .btn-outline {
    background: rgba(255,255,255,0.10);
    border: 1.5px solid rgba(255,255,255,0.38);
    color: rgba(255,255,255,0.9);
    backdrop-filter: blur(8px);
  }
  .btn-outline:hover {
    background: rgba(255,255,255,0.22);
    border-color: rgba(255,255,255,0.65);
    color: #fff;
    box-shadow: 0 6px 20px rgba(0,0,0,0.18);
    transform: translateY(-2px);
  }

  /* ── DIVIDER ── */
  .divider {
    display:flex; align-items:center; gap:12px; margin: 22px 0;
  }
  .divider-line { flex:1; height:1px; background: rgba(255,255,255,0.2); }
  .divider-text { font-size:12px; color:rgba(255,255,255,0.45); }

  /* ── MISC ── */
  .forgot-link {
    font-size:13px; color:rgba(255,255,255,0.75); font-weight:600;
    cursor:pointer; transition:var(--transition); display:inline-block;
  }
  .forgot-link:hover { color:#fff; text-decoration:underline; text-underline-offset:3px; }

  .error-msg {
    color: #ffb5b5; font-size:13px; margin-top:8px;
    text-align:center; display:none;
    background: rgba(239,68,68,0.18);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px; padding: 8px 12px;
  }

  /* ── TOAST ── */
  .toast {
    position:absolute; bottom:40px; left:50%;
    transform:translateX(-50%) translateY(20px);
    background: rgba(255,255,255,0.22);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.4);
    color:#fff; padding:13px 26px;
    border-radius:30px; font-size:14px; font-weight:600;
    opacity:0; transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
    white-space:nowrap; pointer-events:none; z-index:100;
    box-shadow:0 8px 32px rgba(0,0,0,0.25);
    max-width:330px; text-align:center; white-space:normal;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* ── LOGO BADGE ── */
  .logo-badge {
    width: 56px; height: 56px; border-radius: 16px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
    box-shadow: 0 8px 24px rgba(44,74,62,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
    font-size: 26px;
    border: 1px solid rgba(255,255,255,0.2);
    animation: fadeUp 0.5s ease both;
    animation-delay: 0.2s;
  }
</style>
</head>
<body>

<!-- Animated blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div class="blob blob-4"></div>

<div class="phone" id="app">

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- ====== LOGIN ====== -->
  <div class="screen active" id="screen-login">
    <div class="header">
      <button class="back-btn" onclick="location.href='index.html'">←</button>
      <div class="header-title">WASH EASE</div>
      <div style="width:36px"></div>
    </div>

    <div class="scroll-content">
      <div class="glass-card">

        <div class="logo-badge">🫧</div>

        <div style="margin-bottom:28px;">
          <div class="welcome-title">Welcome back! 👋</div>
          <div class="welcome-sub">Sign in to continue</div>
        </div>

        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-input" type="text" placeholder="Enter username" id="login-user">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" placeholder="Enter password" id="login-pass">
        </div>

        <div class="error-msg" id="login-error">Invalid username or password.</div>

        <div style="text-align:right;margin-bottom:22px;">
          <span class="forgot-link">Forgot Password?</span>
        </div>

        <button class="btn btn-primary" onclick="doLogin()">Login</button>

        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">or</span>
          <div class="divider-line"></div>
        </div>

        <button class="btn btn-outline" onclick="location.href='register.html'">Create Account</button>

      </div><!-- end .glass-card -->
    </div>
  </div>

</div><!-- end .phone -->

<script>
let users = JSON.parse(localStorage.getItem('users')) || [];
let currentUser = null;

let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  clearTimeout(toastTimer);
  t.textContent = msg;
  t.className = 'toast' + (type ? ` toast-${type}` : '');
  t.classList.add('show');
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

function doLogin() {
  const uname = document.getElementById('login-user').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const err   = document.getElementById('login-error');

  if (users.length === 0) {
    users.push({ name:'Demo User', username:'user', email:'user@example.com', password:'password' });
    localStorage.setItem('users', JSON.stringify(users));
  }

  const user = users.find(u => u.username === uname && u.password === pass);
  if (!user) { err.style.display = 'block'; return; }

  err.style.display = 'none';
  currentUser = user;
  localStorage.setItem('currentUser', JSON.stringify(user));
  showToast('Welcome back! 🎉');
  setTimeout(() => location.href = 'services.html', 1000);
}
</script>
</body>
</html>
