<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sign In - WASH EASE</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #2C4A3E;
    --primary-light: #3D6B5C;
    --primary-dark: #1A2E26;
    --accent: #E8A87C;
    --text-muted: #6B7280;
    --done: #10B981;
    --danger: #EF4444;
    --glass-bg: rgba(255,255,255,0.12);
    --glass-border: rgba(255,255,255,0.22);
    --radius-sm: 14px;
    --font-display: 'DM Serif Display', serif;
    --font-body: 'DM Sans', sans-serif;
    --transition: all 0.26s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  /* ── BODY — scrollable ── */
  body {
    font-family: var(--font-body);
    background: #D8D0C4;
    min-height: 100vh;
    overflow-x: hidden;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  /* ── PHONE — grows with content ── */
  .phone {
    width: 100%;
    max-width: 390px;
    min-height: 100vh;
    background: linear-gradient(145deg, var(--primary-dark) 0%, var(--primary) 55%, var(--primary-light) 100%);
    position: relative;
    overflow: visible;
    display: flex;
    flex-direction: column;
    box-shadow: 0 24px 64px rgba(0,0,0,0.35);
  }

  /* ── Atmospheric BG ── */
  .bg-orb1 {
    position: fixed; width: 340px; height: 340px; border-radius: 50%;
    background: radial-gradient(circle, rgba(232,168,124,0.18) 0%, transparent 70%);
    top: -100px; right: -80px; pointer-events: none; z-index: 0;
    animation: orbFloat 8s ease-in-out infinite;
  }
  .bg-orb2 {
    position: fixed; width: 260px; height: 260px; border-radius: 50%;
    background: radial-gradient(circle, rgba(61,107,92,0.25) 0%, transparent 70%);
    bottom: 80px; left: -80px; pointer-events: none; z-index: 0;
    animation: orbFloat 10s ease-in-out infinite reverse;
  }
  .bg-orb3 {
    position: fixed; width: 180px; height: 180px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
    top: 40%; left: 50%; transform: translate(-50%,-50%); pointer-events: none; z-index: 0;
  }
  @keyframes orbFloat {
    0%,100%{transform:translateY(0) scale(1);}
    50%{transform:translateY(-22px) scale(1.04);}
  }

  /* ── Bubbles ── */
  .bubble { position:fixed; border-radius:50%; background:rgba(255,255,255,0.06); pointer-events:none; z-index:0; }
  .b1{width:36px;height:36px;left:8%;top:20%;animation:bfloat 11s ease-in-out infinite 0s;}
  .b2{width:18px;height:18px;left:80%;top:15%;animation:bfloat 9s ease-in-out infinite 1s;}
  .b3{width:28px;height:28px;left:75%;top:55%;animation:bfloat 13s ease-in-out infinite 2s;}
  .b4{width:14px;height:14px;left:15%;top:70%;animation:bfloat 10s ease-in-out infinite 0.5s;}
  @keyframes bfloat {
    0%,100%{transform:translateY(0);opacity:.4;}
    50%{transform:translateY(-18px);opacity:.7;}
  }

  /* ── Header — sticky ── */
  .header {
    padding: 16px 20px 14px;
    display: flex; align-items: center; justify-content: space-between;
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--glass-border);
    position: sticky; top: 0; z-index: 10; flex-shrink: 0;
    animation: slideDown 0.5s cubic-bezier(0.34,1.4,0.64,1) both;
  }
  @keyframes slideDown {
    from{opacity:0;transform:translateY(-16px);}
    to{opacity:1;transform:translateY(0);}
  }

  .header-title {
    font-family: var(--font-display);
    font-size: 20px; color: #fff; letter-spacing: -0.3px;
  }

  .back-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; color: rgba(255,255,255,0.85);
    transition: var(--transition);
    backdrop-filter: blur(8px);
  }
  .back-btn:hover {
    background: rgba(255,255,255,0.28);
    border-color: rgba(255,255,255,0.5);
    transform: translateX(-3px) scale(1.05);
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    color: #fff;
  }
  .back-btn:active { transform: scale(0.92); }

  /* ── Scroll area ── */
  .scroll-content {
    flex: 1;
    padding: 20px 20px 48px;
    position: relative; z-index: 5;
  }

  /* ── Welcome block ── */
  .welcome-block {
    margin-bottom: 24px;
    animation: fadeUp 0.5s ease 0.1s both;
  }
  .welcome-block h2 {
    font-family: var(--font-display);
    font-size: 28px; color: #fff;
    margin-bottom: 6px; letter-spacing: -0.5px;
  }
  .welcome-block p { font-size: 14px; color: rgba(255,255,255,0.55); }

  @keyframes fadeUp {
    from{opacity:0;transform:translateY(18px);}
    to{opacity:1;transform:translateY(0);}
  }

  /* ── Form group ── */
  .form-group {
    margin-bottom: 14px;
    animation: fadeUp 0.5s ease both;
  }
  .form-group:nth-child(1){animation-delay:0.15s;}
  .form-group:nth-child(2){animation-delay:0.2s;}
  .form-group:nth-child(3){animation-delay:0.25s;}

  .form-label {
    display: block; font-size: 11px; font-weight: 600;
    color: rgba(255,255,255,0.55); margin-bottom: 7px;
    text-transform: uppercase; letter-spacing: 1px;
  }

  /* ── Glass input ── */
  .form-input {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--glass-border);
    border-radius: var(--radius-sm);
    font-family: var(--font-body); font-size: 15px;
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: #fff;
    outline: none;
    transition: var(--transition);
    -webkit-appearance: none;
  }
  .form-input::placeholder { color: rgba(255,255,255,0.35); }
  .form-input:hover:not(:focus) {
    background: rgba(255,255,255,0.16);
    border-color: rgba(255,255,255,0.35);
  }
  .form-input:focus {
    background: rgba(255,255,255,0.2);
    border-color: rgba(255,255,255,0.6);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.1), 0 4px 20px rgba(0,0,0,0.15);
    transform: translateY(-1px);
  }

  /* ── Forgot link ── */
  .forgot-row {
    text-align: right;
    margin-bottom: 18px;
    animation: fadeUp 0.5s ease 0.3s both;
  }
  .forgot-link {
    font-size: 13px; font-weight: 500;
    color: rgba(255,255,255,0.55);
    cursor: pointer; transition: var(--transition);
    text-decoration: underline; text-underline-offset: 3px;
  }
  .forgot-link:hover { color: #fff; }

  /* ── Error msg ── */
  .error-msg {
    display: none; color: rgba(255,255,255,0.95); font-size: 13px;
    margin-bottom: 12px; text-align: center;
    background: rgba(239,68,68,0.2);
    border: 1px solid rgba(239,68,68,0.35);
    backdrop-filter: blur(10px);
    border-radius: 10px; padding: 10px 14px;
  }

  /* ── Buttons ── */
  .btn-wrap {
    margin-top: 4px;
    animation: fadeUp 0.5s ease 0.38s both;
  }
  .btn-wrap2 {
    margin-top: 12px;
    animation: fadeUp 0.5s ease 0.44s both;
  }

  .btn-glass {
    width: 100%; padding: 16px;
    border-radius: var(--radius-sm); border: none;
    cursor: pointer; font-family: var(--font-body);
    font-size: 15px; font-weight: 600; letter-spacing: 0.4px;
    position: relative; overflow: hidden;
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.35);
    color: #fff;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    transition: all 0.3s cubic-bezier(0.34,1.2,0.64,1);
    box-shadow: 0 4px 20px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .btn-glass::before {
    content: '';
    position: absolute; top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
    transition: left 0.5s ease; pointer-events: none;
  }
  .btn-glass::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
    pointer-events: none;
  }
  .btn-glass:hover {
    background: rgba(255,255,255,0.26);
    border-color: rgba(255,255,255,0.6);
    transform: translateY(-3px) scale(1.01);
    box-shadow: 0 12px 36px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  .btn-glass:hover::before { left: 140%; }
  .btn-glass:active { transform: translateY(0) scale(0.98); }

  /* secondary / outline variant */
  .btn-ghost {
    width: 100%; padding: 14px;
    border-radius: var(--radius-sm);
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.6);
    font-family: var(--font-body); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: var(--transition);
    letter-spacing: 0.2px;
  }
  .btn-ghost:hover {
    border-color: rgba(255,255,255,0.45);
    color: rgba(255,255,255,0.9);
    background: rgba(255,255,255,0.06);
    transform: translateY(-2px);
  }
  .btn-ghost:active { transform: scale(0.97); }

  /* ── Divider ── */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 18px 0;
    animation: fadeUp 0.5s ease 0.42s both;
  }
  .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.15); }
  .divider-text { font-size: 12px; color: rgba(255,255,255,0.35); font-weight: 500; }

  /* ── Link text ── */
  .link-text {
    text-align: center; font-size: 14px;
    color: rgba(255,255,255,0.45); margin-top: 18px;
    animation: fadeUp 0.5s ease 0.5s both;
    padding-bottom: 4px;
  }
  .link-text span {
    color: rgba(255,255,255,0.85); font-weight: 600;
    text-decoration: underline; text-underline-offset: 3px;
    cursor: pointer; transition: var(--transition);
  }
  .link-text span:hover { color: #fff; }

  /* ── Toast — fixed ── */
  .toast {
    position: fixed; bottom: 36px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(16,185,129,0.9);
    backdrop-filter: blur(12px);
    color: #fff; padding: 12px 24px;
    border-radius: 30px; font-size: 14px; font-weight: 600;
    opacity: 0; transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    pointer-events: none; z-index: 200;
    box-shadow: 0 8px 28px rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.2);
    text-align: center; white-space: normal; max-width: 300px;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.error-toast { background: rgba(239,68,68,0.88); }
</style>
</head>
<body>

<!-- Atmospheric background -->
<div class="bg-orb1"></div>
<div class="bg-orb2"></div>
<div class="bg-orb3"></div>
<div class="bubble b1"></div>
<div class="bubble b2"></div>
<div class="bubble b3"></div>
<div class="bubble b4"></div>

<div class="toast" id="toast"></div>

<div class="phone" id="app">

  <!-- Header -->
  <div class="header">
    <button class="back-btn" onclick="location.href='index.html'">←</button>
    <div class="header-title">Sign In</div>
    <div style="width:36px"></div>
  </div>

  <!-- Scroll content -->
  <div class="scroll-content">

    <div class="welcome-block">
      <h2>Welcome back! 👋</h2>
      <p>Sign in to continue</p>
    </div>

    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" type="text" placeholder="Enter your username"
             id="login-user" autocomplete="username">
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" placeholder="Enter your password"
             id="login-pass" autocomplete="current-password">
    </div>

    <div class="forgot-row">
      <span class="forgot-link">Forgot password?</span>
    </div>

    <div class="error-msg" id="login-error">⚠ Invalid username or password.</div>

    <div class="btn-wrap">
      <button class="btn-glass" onclick="doLogin()">Sign In</button>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or</span>
      <div class="divider-line"></div>
    </div>

    <div class="btn-wrap2">
      <button class="btn-ghost" onclick="location.href='register.html'">Create Account</button>
    </div>

    <div class="link-text">
      New here? <span onclick="location.href='register.html'">Register for free</span>
    </div>

  </div>
</div>

<script>
let users = JSON.parse(localStorage.getItem('users')) || [];

let toastTimer;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  clearTimeout(toastTimer);
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error-toast' : '');
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

function doLogin() {
  const uname = document.getElementById('login-user').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const err   = document.getElementById('login-error');

  if (users.length === 0) {
    users.push({ name:'Demo User', username:'user', email:'user@example.com', password:'password' });
    localStorage.setItem('users', JSON.stringify(users));
  }

  const user = users.find(u => u.username === uname && u.password === pass);
  if (!user) { err.style.display = 'block'; return; }

  err.style.display = 'none';
  localStorage.setItem('currentUser', JSON.stringify(user));
  showToast('Welcome back! 🎉');
  setTimeout(() => location.href = 'services.html', 1000);
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
