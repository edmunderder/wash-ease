<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Create Account - WASH EASE</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F0E8;
    --card: #FFFFFF;
    --primary: #2C4A3E;
    --primary-light: #3D6B5C;
    --primary-dark: #1A2E26;
    --accent: #E8A87C;
    --accent-hover: #D4956A;
    --accent2: #D4C5B0;
    --text: #1A1A1A;
    --text-muted: #6B7280;
    --done: #10B981;
    --danger: #EF4444;
    --border: #E5DDD0;
    --radius-sm: 10px;
    --font-display: 'DM Serif Display', serif;
    --font-body: 'DM Sans', sans-serif;
    --transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: var(--font-body);
    background: #D8D0C4;
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .phone {
    width: 100%;
    max-width: 390px;
    height: 100vh;
    max-height: 844px;
    background: var(--bg);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  .screen { display:flex; flex-direction:column; height:100%; animation: slideIn 0.28s cubic-bezier(0.4,0,0.2,1); }
  @keyframes slideIn { from{opacity:0;transform:translateX(24px)} to{opacity:1;transform:translateX(0)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  .header {
    padding: 16px 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    position: relative; z-index: 10;
    flex-shrink: 0;
  }
  .header-title { font-family:var(--font-display); font-size:20px; color:var(--primary); }
  .header .back-btn {
    width:36px; height:36px; border-radius:50%;
    background:var(--bg); border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-size:18px; color:var(--primary); transition:var(--transition);
  }
  .header .back-btn:hover { background:var(--primary); color:#fff; transform:translateX(-2px); box-shadow:0 4px 12px rgba(44,74,62,0.25); }
  .header .back-btn:active { transform:scale(0.92); }

  .scroll-content { flex:1; overflow-y:auto; padding:20px; -webkit-overflow-scrolling:touch; }
  .scroll-content::-webkit-scrollbar { width:4px; }
  .scroll-content::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .form-group { margin-bottom:16px; }
  .form-label { display:block; font-size:12px; font-weight:700; color:var(--text-muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.7px; }

  .input-wrapper { position: relative; width: 100%; }

  .form-input {
    width:100%; padding:14px 16px;
    border:1.5px solid var(--border); border-radius:var(--radius-sm);
    font-family:var(--font-body); font-size:15px;
    background:var(--bg); color:var(--text); outline:none;
    transition:var(--transition); -webkit-appearance:none;
  }
  .form-input:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(44,74,62,0.12); background:#fff; transform:translateY(-1px); }
  .form-input:hover:not(:focus) { border-color:var(--accent2); }
  .form-input.email-invalid { border-color: var(--danger); }
  .form-input.email-valid { border-color: var(--done); }
  .form-input[type="password"], .form-input[type="text"] { padding-right: 50px; }

  .email-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; display: none; }
  .email-hint.show { display: block; }
  .email-hint.error { color: var(--danger); }
  .email-hint.success { color: var(--done); }

  .password-toggle {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    width: 36px; height: 36px; border: none; background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: var(--text-muted); border-radius: 50%; transition: var(--transition);
  }
  .password-toggle:hover { background: rgba(44,74,62,0.08); color: var(--primary); }
  .password-toggle:active { transform: translateY(-50%) scale(0.9); }

  .btn {
    width:100%; padding:15px; border-radius:var(--radius-sm); border:none; cursor:pointer;
    font-family:var(--font-body); font-size:15px; font-weight:600;
    transition:var(--transition); letter-spacing:0.3px; position:relative; overflow:hidden;
  }
  .btn:active { transform:scale(0.97); }
  .btn-primary { background:linear-gradient(135deg, var(--primary), var(--primary-light)); color:#fff; box-shadow:0 4px 16px rgba(44,74,62,0.25); }
  .btn-primary:hover { background:linear-gradient(135deg, var(--primary-dark), var(--primary)); box-shadow:0 8px 24px rgba(44,74,62,0.35); transform:translateY(-2px); }
  .btn-primary:active { transform:translateY(0) scale(0.97); }

  /* ✅ FIX: error-msg now visible by default flow (display:none via JS) */
  .error-msg {
    color: var(--danger); font-size: 13px; margin-top: 8px;
    text-align: center; display: none;
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 8px; padding: 10px 14px;
  }

  .link-text { text-align:center; font-size:14px; color:var(--text-muted); margin-top:16px; cursor:pointer; }
  .link-text span { color:var(--primary); font-weight:600; text-decoration:underline; text-underline-offset:2px; }

  .toast {
    position:absolute; bottom:110px; left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--primary); color:#fff; padding:12px 24px;
    border-radius:30px; font-size:14px; font-weight:600;
    opacity:0; transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
    pointer-events:none; z-index:100;
    box-shadow:0 8px 24px rgba(44,74,62,0.3); max-width:330px;
    text-align:center; white-space:normal;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="phone" id="app">

  <div class="toast" id="toast"></div>

  <div class="screen active" id="screen-register">
    <div class="header">
      <!-- ✅ FIX 1: Back button now goes to login.html, not index.html -->
      <button class="back-btn" onclick="location.href='login.html'">←</button>
      <div class="header-title">Create Account</div>
      <div style="width:36px"></div>
    </div>

    <div class="scroll-content">
      <div style="margin-bottom:24px;animation:fadeUp 0.4s ease;">
        <div style="font-family:var(--font-display);font-size:26px;color:var(--primary);margin-bottom:6px;">Welcome! 👋</div>
        <div style="font-size:14px;color:var(--text-muted);">Let's set up your account</div>
      </div>

      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input class="form-input" type="text" placeholder="Enter your full name" id="reg-name">
      </div>

      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" type="text" placeholder="Choose a username" id="reg-user">
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" placeholder="Enter your email" id="reg-email" oninput="validateEmail(this)">
        <div class="email-hint" id="email-hint"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrapper">
          <input class="form-input" type="password" placeholder="Create a password" id="reg-pass">
          <button type="button" class="password-toggle" onclick="togglePassword('reg-pass', this)">👁️</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div class="input-wrapper">
          <input class="form-input" type="password" placeholder="Repeat your password" id="reg-pass2">
          <button type="button" class="password-toggle" onclick="togglePassword('reg-pass2', this)">👁️</button>
        </div>
      </div>

      <div class="error-msg" id="reg-error"></div>
      <button class="btn btn-primary" style="margin-top:8px;" onclick="doRegister()">Sign Up</button>
      <div class="link-text" onclick="location.href='login.html'">Already have an account? <span>Sign In</span></div>
    </div>
  </div>

</div>

<script>
let users = JSON.parse(localStorage.getItem('users')) || [];

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  clearTimeout(toastTimer);
  t.textContent = msg;
  t.className = 'toast show';
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

function validateEmail(input) {
  const email = input.value.trim();
  const hint = document.getElementById('email-hint');
  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if (email === '') {
    input.classList.remove('email-valid', 'email-invalid');
    hint.classList.remove('show', 'error', 'success');
    return false;
  }
  if (emailPattern.test(email)) {
    input.classList.remove('email-invalid');
    input.classList.add('email-valid');
    hint.textContent = '✓ Valid email address';
    hint.className = 'email-hint success show';
    return true;
  } else {
    input.classList.remove('email-valid');
    input.classList.add('email-invalid');
    hint.textContent = '✗ Please enter a valid email (e.g., user@email.com)';
    hint.className = 'email-hint error show';
    return false;
  }
}

function togglePassword(inputId, btn) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁️';
  }
}

function showError(msg) {
  const err = document.getElementById('reg-error');
  err.textContent = msg;
  err.style.display = 'block';
  // Shake animation
  err.animate([
    { transform: 'translateX(-4px)' },
    { transform: 'translateX(4px)' },
    { transform: 'translateX(-4px)' },
    { transform: 'translateX(0)' }
  ], { duration: 300, easing: 'ease-out' });
}

function doRegister() {
  const name  = document.getElementById('reg-name').value.trim();
  const uname = document.getElementById('reg-user').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass  = document.getElementById('reg-pass').value;
  const pass2 = document.getElementById('reg-pass2').value;
  const err   = document.getElementById('reg-error');

  err.style.display = 'none';

  // ✅ FIX 2: pass2 is now included in the empty check
  if (!name || !uname || !email || !pass || !pass2) {
    showError('Please fill in all fields.');
    return;
  }

  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailPattern.test(email)) {
    showError('Please enter a valid email address.');
    return;
  }

  if (pass.length < 6) {
    showError('Password must be at least 6 characters.');
    return;
  }

  // ✅ FIX 3: Password match check — stops here if they don't match
  if (pass !== pass2) {
    showError('Passwords do not match.');
    return;
  }

  if (users.find(u => u.username === uname)) {
    showError('Username already taken. Choose another.');
    return;
  }

  // ✅ All validations passed — save and redirect
  const newUser = { name, username: uname, email, password: pass };
  users.push(newUser);
  localStorage.setItem('users', JSON.stringify(users));
  localStorage.setItem('currentUser', JSON.stringify(newUser));
  showToast('Account created! 🎉');
  setTimeout(() => location.href = 'services.html', 1200);
}
</script>
</body>
</html>
